frequency: 50
sensor_timeout: 0.1
two_d_mode: true
transform_time_offset: 0.0
transform_timeout: 0.0
print_diagnostics: true
debug: false
publish_tf: true
publish_acceleration: false
permit_corrected_publication: false

map_frame: rtk_map
odom_frame: odom
base_link_frame: base_link
world_frame: odom

odom0: /ranger_base_node/odom
# Wheel odom now only contributes local motion constraints: forward velocity
# plus the nonholonomic vy=0 constraint. Absolute heading is delegated to the
# corrected IMU yaw.
odom0_config: [false, false, false,
               false, false, false,
               true,  true,  false,
               false, false, false,
               false, false, false]
odom0_queue_size: 10
odom0_nodelay: true
odom0_differential: false
odom0_relative: false
odom0_pose_rejection_threshold: 5.0
odom0_twist_rejection_threshold: 2.0

imu0: /IMU_data_enu
# The corrected IMU now provides the local heading anchor. Keep yaw rate fused
# as well so short-term turn dynamics remain responsive.
imu0_config: [false, false, false,
              false, false, true,
              false, false, false,
              false, false, true,
              false, false, false]
imu0_queue_size: 20
imu0_nodelay: true
imu0_differential: false
imu0_relative: false
imu0_twist_rejection_threshold: 1.5
imu0_remove_gravitational_acceleration: false


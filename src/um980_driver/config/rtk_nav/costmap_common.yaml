# Shared costmap parameters for RTK-based navigation in the LiDAR map frame.

global_costmap:
  global_frame: map
  robot_base_frame: base_link
  transform_tolerance: 0.5
  update_frequency: 2.0
  publish_frequency: 1.0
  resolution: 0.05
  footprint: [[-0.35, -0.25], [0.35, -0.25], [0.35, 0.25], [-0.35, 0.25]]
  footprint_padding: 0.03

  static_layer:
    enabled: true
    map_topic: /map
    subscribe_to_updates: false

  inflation_layer:
    enabled: true
    inflation_radius: 0.80
    cost_scaling_factor: 3.0

local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  transform_tolerance: 0.5
  update_frequency: 8.0
  publish_frequency: 4.0
  rolling_window: true
  width: 6.0
  height: 6.0
  resolution: 0.05
  footprint: [[-0.35, -0.25], [0.35, -0.25], [0.35, 0.25], [-0.35, 0.25]]
  footprint_padding: 0.03

  static_layer:
    enabled: true
    map_topic: /map
    subscribe_to_updates: false

  inflation_layer:
    enabled: true
    inflation_radius: 0.45
    cost_scaling_factor: 3.0

RegulatedPurePursuitPlanner:
  desired_linear_vel: 0.30
  min_linear_vel: 0.05
  max_linear_vel: 0.35

  # Larger lookahead smooths localization jitter and sharp waypoint corners;
  # smaller lookahead tracks tighter but can amplify left-right twitching.
  min_lookahead: 1.2
  max_lookahead: 2.8
  lookahead_time: 1.5

  xy_goal_tolerance: 0.30
  yaw_goal_tolerance: 1.57

  max_angular_vel: 0.55
  max_linear_accel: 0.40
  max_angular_accel: 0.80
  angular_deadband: 0.03
  lateral_deadband: 0.03

  curvature_slowdown_gain: 1.2
  approach_slowdown_distance: 1.0

  # First version is conservative: stop when the direct pursuit segment ahead
  # intersects an occupied local costmap cell. Complex obstacle bypass should
  # remain a higher-level recovery/rejoin behavior.
  stop_on_obstacle: true
  obstacle_check_distance: 1.0
  obstacle_check_step: 0.10
  obstacle_cost_threshold: 253
  obstacle_unknown_is_blocking: false

  transform_tolerance: 0.2
  publish_debug: true

DWAPlannerROS:
  odom_topic: /odometry/filtered

  holonomic_robot: false

  max_vel_x: 0.35
  min_vel_x: 0.0
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.35
  min_vel_trans: 0.0
  max_vel_theta: 0.65
  # Route following works better when DWA can make smaller steering corrections
  # instead of alternating between relatively large left/right spins.
  min_vel_theta: 0.22

  acc_lim_x: 0.8
  acc_lim_y: 0.0
  acc_lim_theta: 2.0
  acc_lim_trans: 0.8
  trans_stopped_vel: 0.04
  theta_stopped_vel: 0.05

  xy_goal_tolerance: 0.25
  # Waypoint patrol advances on pass_radius, so intermediate checkpoints should
  # not force the robot to stop and align to a precise heading.
  yaw_goal_tolerance: 1.57
  latch_xy_goal_tolerance: true

  sim_time: 1.5
  sim_granularity: 0.05
  angular_sim_granularity: 0.05
  vx_samples: 8
  vy_samples: 1
  vth_samples: 32
  oscillation_reset_angle: 0.05

  path_distance_bias: 64.0
  goal_distance_bias: 8.0
  occdist_scale: 0.02
  forward_point_distance: 0.15
  stop_time_buffer: 0.2
  scaling_speed: 0.2
  max_scaling_factor: 0.2

  prune_plan: true
  publish_traj_pc: true
  publish_cost_grid_pc: false
  global_frame_id: odom

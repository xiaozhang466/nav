local_costmap:
  static_map: false
  rolling_window: true
  track_unknown_space: false
  always_send_full_costmap: false

  # First bring-up uses only the static map around the robot. Add an obstacle
  # layer later when LiDAR obstacle input is ready and verified.
  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
